<div class="container">
  <div class="grid">
    <mat-card *ngFor="let product of products" class="card">

      <img mat-card-image [src]="product.imageUrl" />

      <mat-card-content>
        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary">
          Add to Cart
        </button>
      </mat-card-actions>

    </mat-card>
  </div>
</div>
